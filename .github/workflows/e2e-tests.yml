name: E2E Tests - Playwright

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-playwright-${{ hashFiles('package-lock.json', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-playwright-
      
      - name: Install dependencies
        run: |
          if [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Build TypeScript
        run: |
          if [ -f "yarn.lock" ]; then
            yarn build --if-present || true
          else
            npm run build --if-present || true
          fi
        continue-on-error: true
      
      - name: Run E2E Tests
        run: npx playwright test core/src/components/accordion/test/basic/accordion.e2e.ts core/src/components/accordion/test/disabled/accordion.e2e.ts core/src/components/accordion/test/multiple/accordion.e2e.ts core/src/components/accordion/test/nested/accordion.e2e.ts core/src/components/accordion/test/readonly/accordion.e2e.ts core/src/components/accordion/test/standalone/accordion.e2e.ts core/src/components/action-sheet/test/a11y/action-sheet.e2e.ts core/src/components/action-sheet/test/basic/action-sheet-rendering.e2e.ts core/src/components/action-sheet/test/basic/action-sheet.e2e.ts core/src/components/action-sheet/test/is-open/action-sheet.e2e.ts core/src/components/action-sheet/test/translucent/action-sheet.e2e.ts core/src/components/action-sheet/test/trigger/action-sheet.e2e.ts core/src/components/alert/test/a11y/alert.e2e.ts core/src/components/alert/test/basic/alert-tablet.e2e.ts core/src/components/alert/test/basic/alert.e2e.ts core/src/components/alert/test/is-open/alert.e2e.ts core/src/components/alert/test/standalone/alert.e2e.ts core/src/components/alert/test/trigger/alert.e2e.ts core/src/components/app/test/safe-area/app.e2e.ts core/src/components/avatar/test/basic/avatar.e2e.ts core/src/components/back-button/test/a11y/back-button.e2e.ts core/src/components/back-button/test/basic/back-button.e2e.ts core/src/components/back-button/test/toolbar/back-button.e2e.ts core/src/components/badge/test/a11y/badge.e2e.ts core/src/components/badge/test/basic/badge.e2e.ts core/src/components/breadcrumbs/test/a11y/breadcrumbs.e2e.ts core/src/components/breadcrumbs/test/basic/breadcrumbs.e2e.ts core/src/components/breadcrumbs/test/collapsed/breadcrumbs.e2e.ts core/src/components/breadcrumbs/test/reactive/breadcrumbs.e2e.ts core/src/components/button/test/a11y/button.e2e.ts core/src/components/button/test/basic/button.e2e.ts core/src/components/button/test/clear/button.e2e.ts core/src/components/button/test/expand/button.e2e.ts core/src/components/button/test/form